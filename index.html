<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta id="vp" name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Marchas Cofrades</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#08080f;--surface:#100f1a;--surface2:#181626;--border:rgba(180,140,60,0.18);--gold:#c8a845;--gold2:#e8cc80;--goldglow:rgba(200,168,69,0.3);--text:#f2ead8;--muted:#8a8070;}
html{font-size:16px;-webkit-text-size-adjust:none!important;text-size-adjust:none!important;}
@media(max-width:420px){html{font-size:4vw}}
@media(min-width:600px){html{font-size:16px}}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Crimson Text',serif;overflow-x:hidden}
body{background:radial-gradient(ellipse 100% 50% at 50% -10%,rgba(200,168,69,.07) 0%,transparent 60%),var(--bg)}
.page{display:none;min-height:100vh;width:100%}
.page.active{display:flex;flex-direction:column;align-items:center}
.page.active{padding-bottom:15vw}
@media(min-width:440px){.page.active{padding-bottom:70px}}

/* HOME */
#page-home{height:100vh;overflow:hidden;justify-content:center;align-items:center;padding:6vw 5vw 18vw;gap:4vw;flex-direction:column;}
@media(min-width:440px){#page-home{padding:30px 24px 80px;gap:16px}}
.home-title{text-align:center}
.home-title .crown{font-size:7vw;margin-bottom:1.5vw}
.home-title h1{font-family:'Cinzel',serif;font-size:6vw;font-weight:900;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;line-height:1.1}
@media(min-width:440px){.home-title .crown{font-size:30px}.home-title h1{font-size:26px}}
.section-btn{width:100%;max-width:420px;min-height:18vw;border:none;border-radius:3.5vw;display:flex;align-items:center;gap:4vw;padding:0 5vw;cursor:pointer;touch-action:manipulation;transition:transform .15s;position:relative;overflow:hidden;}
@media(min-width:440px){.section-btn{min-height:72px;border-radius:14px;gap:16px;padding:0 20px}}
.section-btn:active{transform:scale(.97)}
.section-btn .sec-icon{font-size:7vw;flex-shrink:0}
@media(min-width:440px){.section-btn .sec-icon{font-size:28px}}
.section-btn .sec-name{font-family:'Cinzel',serif;font-size:4.2vw;font-weight:700;display:block;line-height:1.2}
@media(min-width:440px){.section-btn .sec-name{font-size:17px}}
.section-btn .sec-sub{font-family:'Crimson Text',serif;font-size:3.2vw;opacity:.8;font-style:italic}
@media(min-width:440px){.section-btn .sec-sub{font-size:13px}}
.section-btn.ct{background:linear-gradient(135deg,#1a1510,#2a200a);border:1px solid rgba(200,168,69,.4);color:var(--gold2);box-shadow:0 4px 20px rgba(200,168,69,.15)}
.section-btn.am{background:linear-gradient(135deg,#0d1520,#0d1f35);border:1px solid rgba(60,130,200,.35);color:#7bbfee;box-shadow:0 4px 20px rgba(60,130,200,.1)}
.section-btn.bm{background:linear-gradient(135deg,#0d1a10,#102515);border:1px solid rgba(60,180,80,.3);color:#7de09a;pointer-events:none;opacity:.5}
.section-btn .coming{position:absolute;top:2vw;right:2vw;background:rgba(255,255,255,.1);border-radius:99px;font-family:'Cinzel',serif;font-size:2vw;padding:.5vw 2vw;opacity:.7}
@media(min-width:440px){.section-btn .coming{font-size:9px;padding:3px 8px;top:8px;right:8px}}

/* INDEX */
#page-index{padding:3vw 3vw 3vw;height:100vh;overflow:hidden;justify-content:flex-start}
.index-header{text-align:center;margin-bottom:2vw;width:100%}
.index-header .crown{font-size:6vw;margin-bottom:1vw}
.index-header h1{font-family:'Cinzel',serif;font-size:5.5vw;font-weight:900;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;line-height:1.1}
.index-header p{font-size:3vw;color:var(--muted);margin-top:1vw}
@media(min-width:440px){.index-header .crown{font-size:24px}.index-header h1{font-size:22px}.index-header p{font-size:13px}}
.alpha-section{width:100%;max-width:520px;padding:0 2vw;flex:1;display:flex;flex-direction:column;justify-content:center}
.alpha-label{display:none}
.alpha-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1.8vw;margin-bottom:0}
@media(min-width:440px){.alpha-grid{grid-template-columns:repeat(7,1fr);gap:8px}}
.alpha-btn{aspect-ratio:1;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:2vw;color:var(--text);font-family:'Cinzel',serif;font-size:4.5vw;font-weight:600;cursor:pointer;transition:background .18s,border-color .18s,transform .12s;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
@media(min-width:440px){.alpha-btn{font-size:18px;border-radius:8px}}
.alpha-btn:active{background:rgba(200,168,69,.15);border-color:var(--gold);transform:scale(.93)}
.alpha-btn.disabled{opacity:.28;pointer-events:none}
.special-letter-btn{background:rgba(200,168,69,0.15)!important;border-color:var(--gold)!important;color:var(--gold2)!important}
.fav-letter-btn{background:rgba(224,85,85,0.15)!important;border-color:rgba(224,85,85,0.5)!important}
.special-letter-btn span,.fav-letter-btn svg{font-size:4vw!important}
@media(min-width:440px){.special-letter-btn span{font-size:14px!important}.fav-letter-btn svg{width:20px!important;height:20px!important}}

/* LIST */
#page-list{padding:0;width:100%;align-items:center}
.list-topbar{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:0 4vw;min-height:14vw;display:flex;align-items:center;gap:3vw;position:sticky;top:0;z-index:10;max-width:600px;}
@media(min-width:440px){.list-topbar{min-height:58px;padding:0 16px}}
.back-btn{min-height:11vw;min-width:11vw;padding:0 3vw;background:none;border:1px solid var(--border);border-radius:2vw;color:var(--gold);font-family:'Cinzel',serif;font-size:3.5vw;cursor:pointer;transition:background .18s;display:flex;align-items:center;gap:1.5vw;touch-action:manipulation;flex-shrink:0;}
@media(min-width:440px){.back-btn{min-height:44px;font-size:14px;border-radius:8px}}
.back-btn svg{width:4.5vw;height:4.5vw;flex-shrink:0}
@media(min-width:440px){.back-btn svg{width:16px;height:16px}}
.back-btn:active{background:rgba(200,168,69,.1)}
.list-title{font-family:'Cinzel',serif;font-size:6vw;font-weight:900;color:var(--gold2);flex:1;min-width:0}
@media(min-width:440px){.list-title{font-size:24px}}
.list-count{font-size:3vw;color:var(--muted);flex-shrink:0}
@media(min-width:440px){.list-count{font-size:12px}}
.loading-msg{text-align:center;padding:10vw 5vw;color:var(--muted);font-size:4vw;font-style:italic}
.loading-spinner{width:9vw;height:9vw;border:0.8vw solid rgba(200,168,69,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 4vw}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:10vw 5vw;color:#c87070;font-size:4vw}
.track-list{width:100%;max-width:600px;padding-bottom:6vw}
.track-item{display:flex;align-items:center;gap:3vw;padding:0 4vw;min-height:17vw;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .15s;touch-action:manipulation;}
@media(min-width:440px){.track-item{min-height:68px;gap:12px;padding:0 16px}}
.track-item:active{background:rgba(200,168,69,.08)}
.track-item.now-playing{background:rgba(200,168,69,.1)}
.ti-num{font-family:'Cinzel',serif;font-size:3vw;color:var(--muted);width:5.5vw;text-align:right;flex-shrink:0}
.track-item.now-playing .ti-num{color:var(--gold)}
.ti-icon{width:10.5vw;height:10.5vw;border-radius:2.5vw;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
@media(min-width:440px){.ti-icon{width:42px;height:42px;border-radius:9px}}
.ti-icon svg{width:5vw;height:5vw;color:var(--muted)}
.track-item.now-playing .ti-icon{background:rgba(200,168,69,.15);border-color:var(--gold)}
.track-item.now-playing .ti-icon svg{color:var(--gold)}
.ti-info{flex:1;min-width:0}
.ti-title{font-size:4.2vw;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
@media(min-width:440px){.ti-title{font-size:17px}}
.track-item.now-playing .ti-title{color:var(--gold2)}
.ti-artist{font-size:3.3vw;color:var(--muted);margin-top:0.5vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
@media(min-width:440px){.ti-artist{font-size:14px}}
.pulse-dot{width:2vw;height:2vw;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease-in-out infinite;display:none;flex-shrink:0}
.track-item.now-playing.playing .pulse-dot{display:block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}

/* FAVORITOS */
.fav-btn{background:none;border:none;cursor:pointer;padding:2vw;touch-action:manipulation;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.fav-btn svg{width:5.5vw;height:5.5vw;transition:transform .2s}
@media(min-width:440px){.fav-btn svg{width:22px;height:22px}}
.fav-btn:active svg{transform:scale(1.3)}
.fav-btn .heart-empty{fill:none;stroke:var(--muted);stroke-width:2}
.fav-btn .heart-full{fill:#e05555;stroke:#e05555;stroke-width:2;display:none}
.fav-btn.active .heart-empty{display:none}
.fav-btn.active .heart-full{display:block}
.fav-empty{text-align:center;padding:10vw 5vw;color:var(--muted);font-size:4vw;font-style:italic}

/* PLAYER */
#page-player{padding:4vw 4vw 9vw;width:100%}
.player-topbar{width:100%;display:flex;align-items:center;gap:2.5vw;margin-bottom:5vw}
.player-breadcrumb{flex:1;font-size:3vw;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.player-card{width:100%;max-width:480px;background:var(--surface);border-radius:5vw;padding:6vw 5vw;border:1px solid var(--border);box-shadow:0 4vw 12vw rgba(0,0,0,.55);position:relative;overflow:hidden;}
@media(min-width:440px){.player-card{border-radius:20px;padding:26px 20px}}
.player-fav-btn{position:absolute;top:4vw;right:4vw;background:none;border:none;cursor:pointer;touch-action:manipulation;padding:2vw;}
@media(min-width:440px){.player-fav-btn{top:16px;right:16px;padding:8px}}
.player-fav-btn svg{width:7vw;height:7vw;transition:transform .2s}
@media(min-width:440px){.player-fav-btn svg{width:26px;height:26px}}
.player-fav-btn:active svg{transform:scale(1.3)}
.player-fav-btn .heart-empty{fill:none;stroke:var(--muted);stroke-width:2}
.player-fav-btn .heart-full{fill:#e05555;stroke:#e05555;stroke-width:2;display:none}
.player-fav-btn.active .heart-empty{display:none}
.player-fav-btn.active .heart-full{display:block}
.vinyl-wrap{display:flex;justify-content:center;margin-bottom:5vw}
.vinyl{width:42vw;height:42vw;border-radius:50%;background:radial-gradient(circle,#1c1a2e 0%,#0c0b18 38%,#181530 55%,#0c0b18 70%,#1c1a2e 100%);position:relative;box-shadow:0 2vw 7vw rgba(0,0,0,.6);}
@media(min-width:440px){.vinyl{width:160px;height:160px}}
.vinyl.spinning{animation:vspin 4s linear infinite}
@keyframes vspin{to{transform:rotate(360deg)}}
.vinyl::before{content:'';position:absolute;inset:0;border-radius:50%;background:repeating-conic-gradient(rgba(255,255,255,.015) 0deg,transparent 1deg,transparent 3deg,rgba(255,255,255,.015) 4deg)}
.vinyl-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7vw;height:7vw;border-radius:50%;background:radial-gradient(circle,var(--gold2) 0%,var(--gold) 60%,#7a5a20 100%);box-shadow:0 0 2.5vw var(--goldglow)}
@media(min-width:440px){.vinyl-center{width:28px;height:28px}}
.vinyl-center::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2vw;height:2vw;border-radius:50%;background:var(--bg)}
.track-info-player{text-align:center;margin-bottom:4.5vw;padding:0 5vw}
.tip-title{font-family:'Cinzel',serif;font-size:4.8vw;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:1.5vw}
@media(min-width:440px){.tip-title{font-size:19px}}
.tip-artist{font-size:3.5vw;color:var(--gold);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-wrap{padding:1vw 0}
.prog-bg{width:100%;height:1.2vw;background:rgba(255,255,255,.08);border-radius:99px;cursor:pointer;position:relative;padding:2.5vw 0;margin:-2.5vw 0}
.prog-fill{height:1.2vw;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px;width:0%;transition:width .1s linear;position:relative;pointer-events:none}
.prog-fill::after{content:'';position:absolute;right:-1.5vw;top:50%;transform:translateY(-50%);width:3.5vw;height:3.5vw;background:var(--gold2);border-radius:50%;}
.times{display:flex;justify-content:space-between;font-size:3vw;color:var(--muted);margin-top:2.5vw}
.controls{display:flex;align-items:center;justify-content:center;gap:4vw;margin-top:5vw}
.btn{background:none;border:none;cursor:pointer;color:var(--muted);min-width:12vw;min-height:12vw;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:color .2s,transform .12s;touch-action:manipulation;}
@media(min-width:440px){.btn{min-width:48px;min-height:48px}}
.btn:active{transform:scale(.88)}
.btn svg{width:7vw;height:7vw}
@media(min-width:440px){.btn svg{width:26px;height:26px}}
.btn-play{min-width:16vw;min-height:16vw;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg)!important;border-radius:50%;box-shadow:0 1vw 5vw var(--goldglow)}
@media(min-width:440px){.btn-play{min-width:64px;min-height:64px}}
.btn-play svg{width:8vw;height:8vw}
@media(min-width:440px){.btn-play svg{width:28px;height:28px}}
.vol-row{display:flex;align-items:center;gap:2.5vw;margin-top:4.5vw}
.vol-row svg{width:4.5vw;height:4.5vw;color:var(--muted);flex-shrink:0}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:1vw;background:rgba(255,255,255,.08);border-radius:99px;outline:none;cursor:pointer;padding:2.5vw 0;margin:-2.5vw 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:5.5vw;height:5.5vw;border-radius:50%;background:var(--gold);cursor:pointer}
.loading-bar{height:0.5vw;background:linear-gradient(90deg,transparent,var(--gold),transparent);background-size:200% 100%;animation:ldg 1.5s linear infinite;border-radius:99px;display:none;margin-bottom:-0.5vw}
.loading-bar.on{display:block}
@keyframes ldg{0%{background-position:200% 0}100%{background-position:-200% 0}}
.mini-playlist{margin-top:4vw;border-top:1px solid var(--border);padding-top:3vw}
.mp-header{font-family:'Cinzel',serif;font-size:2.5vw;letter-spacing:3px;text-transform:uppercase;color:var(--gold);opacity:.65;margin-bottom:1.5vw}
.mp-item{display:flex;align-items:center;gap:2.5vw;padding:0 2vw;min-height:13vw;border-radius:2vw;cursor:pointer;transition:background .15s;touch-action:manipulation;}
@media(min-width:440px){.mp-item{min-height:52px;gap:10px;padding:0 8px;border-radius:8px}}
.mp-item:active{background:rgba(200,168,69,.08)}
.mp-item.active{background:rgba(200,168,69,.1)}
.mp-num{font-family:'Cinzel',serif;font-size:3vw;color:var(--muted);width:4vw;text-align:right;flex-shrink:0}
.mp-item.active .mp-num{color:var(--gold)}
.mp-info{flex:1;min-width:0}
.mp-title{font-size:4vw;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-item.active .mp-title{color:var(--gold2)}
.mp-art{font-size:3.2vw;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.mp-pd{width:2vw;height:2vw;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease-in-out infinite;display:none;flex-shrink:0}
.mp-item.active.playing .mp-pd{display:block}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;height:14vw;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,0.4);}
@media(min-width:440px){.bottom-nav{height:58px}}
.nav-btn{flex:1;height:100%;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1vw;color:var(--muted);touch-action:manipulation;transition:color .18s;}
@media(min-width:440px){.nav-btn{gap:4px}}
.nav-btn svg{width:6vw;height:6vw}
@media(min-width:440px){.nav-btn svg{width:22px;height:22px}}
.nav-btn span{font-family:'Cinzel',serif;font-size:2.2vw;letter-spacing:0.5px}
@media(min-width:440px){.nav-btn span{font-size:10px}}
.nav-btn.active{color:var(--gold)}
</style>
</head>
<body>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="home-title">
    <div class="crown">✝</div>
    <h1>Marchas<br>Cofrades</h1>
  </div>
  <button class="section-btn ct" onclick="goToSection('ct')">
    <span class="sec-icon">🎺</span>
    <div class="sec-text">
      <span class="sec-name">Cornetas y Tambores</span>
      <span class="sec-sub">Marchas procesionales</span>
    </div>
  </button>
  <button class="section-btn am" onclick="goToSection('am')">
    <span class="sec-icon">🎼</span>
    <div class="sec-text">
      <span class="sec-name">Agrupación Musical</span>
      <span class="sec-sub">Marchas procesionales</span>
    </div>
  </button>
  <button class="section-btn bm">
    <span class="sec-icon">🥁</span>
    <div class="sec-text">
      <span class="sec-name">Banda de Música</span>
      <span class="sec-sub">Próximamente</span>
    </div>
    <span class="coming">Pronto</span>
  </button>
</div>

<!-- INDEX -->
<div id="page-index" class="page">
  <div class="index-header">
    <div class="crown">✝</div>
    <h1>Cornetas y Tambores</h1>
    <p>Selecciona una letra</p>
  </div>
  <div class="alpha-section">
    <div class="alpha-grid" id="alphaGridLetters"></div>
  </div>
</div>

<!-- LIST -->
<div id="page-list" class="page">
  <div class="list-topbar">
    <button class="back-btn" onclick="showPage('index')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Índice
    </button>
    <span class="list-title" id="listTitle">A</span>
    <span class="list-count" id="listCount"></span>
  </div>
  <div id="listBody" class="track-list"></div>
</div>

<!-- PLAYER -->
<div id="page-player" class="page">
  <div class="player-topbar">
    <button class="back-btn" onclick="showPage('list')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Lista
    </button>
    <span class="player-breadcrumb" id="playerBreadcrumb"></span>
  </div>
  <div class="player-card">
    <div class="loading-bar" id="loadingBar"></div>
    <button class="player-fav-btn" id="playerFavBtn" onclick="toggleFavCurrent()">
      <svg viewBox="0 0 24 24"><path class="heart-empty" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/><path class="heart-full" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </button>
